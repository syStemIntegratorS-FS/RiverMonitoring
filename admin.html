<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRM Admin | All Rivers Monitor</title>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #0a0e12;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1e24, #0f1217);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2f38;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #8892b0;
            margin-top: 5px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a1e24;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2f38;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Site Card */
        .site-card {
            background: #1a1e24;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2f38;
            transition: all 0.2s;
        }

        .site-card.level-red { 
            background: #2a0a0a; 
            border-left: 4px solid #f44336;
            animation: pulse-red 0.5s infinite;
        }
        .site-card.level-orange { 
            background: #2a1a0a; 
            border-left: 4px solid #ff9800;
            animation: pulse-orange 0.8s infinite;
        }
        .site-card.level-yellow { 
            background: #2a2a0a; 
            border-left: 4px solid #ffc107;
        }
        .site-card.level-normal { 
            background: #0a1a0a; 
            border-left: 4px solid #4caf50;
        }
        .site-card.offline {
            background: #1a1a1a;
            border-left: 4px solid #757575;
            opacity: 0.7;
        }

        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }

        @keyframes pulse-orange {
            0% { opacity: 1; }
            50% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .site-title h3 {
            font-size: 1.1em;
        }
        .site-title p {
            font-size: 0.8em;
            color: #8892b0;
        }

        .site-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
        }
        .status-online { background: #4caf50; color: white; }
        .status-offline { background: #757575; color: white; }
        .status-warning { background: #ff9800; color: white; }

        .alert-display {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            margin: 10px 0;
            border-radius: 16px;
        }

        .alert-message {
            font-size: 0.9em;
            text-align: center;
            margin: 10px 0;
            color: #8892b0;
        }

        .alert-instruction {
            background: #0f1217;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8em;
            text-align: center;
        }

        .site-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.7em;
            color: #8892b0;
        }

        .last-update {
            font-family: monospace;
        }

        /* Logs Section */
        .logs-section {
            background: #1a1e24;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2f38;
        }

        .logs-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 8px;
            border-left: 3px solid;
            margin-bottom: 5px;
            background: #0f1217;
            border-radius: 8px;
            font-size: 0.8em;
            font-family: monospace;
        }

        .log-red { border-left-color: #f44336; }
        .log-orange { border-left-color: #ff9800; }
        .log-yellow { border-left-color: #ffc107; }
        .log-normal { border-left-color: #4caf50; }
        .log-telemetry { border-left-color: #2196f3; }

        .connection-bar {
            background: #0f1217;
            border-radius: 60px;
            padding: 10px 16px;
            text-align: center;
            font-size: 0.8em;
            margin-top: 20px;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            display: inline-block;
            margin-right: 8px;
        }
        .led-online { background: #4caf50; box-shadow: 0 0 6px #4caf50; animation: pulse 1s infinite; }
        .led-offline { background: #f44336; }
        .led-waiting { background: #ffc107; animation: pulse 1s infinite; }

        button {
            background: #2a2f38;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #3a3f48;
        }

        .logs-list::-webkit-scrollbar {
            width: 6px;
        }
        .logs-list::-webkit-scrollbar-track {
            background: #0f1217;
            border-radius: 10px;
        }
        .logs-list::-webkit-scrollbar-thumb {
            background: #2a2f38;
            border-radius: 10px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌊 DRM River Monitoring System</h1>
        <div class="subtitle">Admin Command Center | All Rivers & Locations</div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <div>🌊 TOTAL SITES</div>
            <div class="stat-value" id="totalSites">0</div>
        </div>
        <div class="stat-card">
            <div>🔴 RED ALERTS</div>
            <div class="stat-value" id="redCount" style="color: #f44336;">0</div>
        </div>
        <div class="stat-card">
            <div>🟠 ORANGE ALERTS</div>
            <div class="stat-value" id="orangeCount" style="color: #ff9800;">0</div>
        </div>
        <div class="stat-card">
            <div>🟡 YELLOW ALERTS</div>
            <div class="stat-value" id="yellowCount" style="color: #ffc107;">0</div>
        </div>
    </div>

    <div class="dashboard-grid" id="dashboardGrid">
        <div style="text-align: center; padding: 50px;">Loading sites...</div>
    </div>

    <div class="logs-section">
        <div class="logs-header">
            <span>📜 SYSTEM-WIDE INCIDENT LOG</span>
            <button onclick="exportLogs()">📥 EXPORT CSV</button>
        </div>
        <div class="logs-list" id="logsList">
            <div style="text-align: center; padding: 20px;">Waiting for data...</div>
        </div>
    </div>

    <div class="connection-bar">
        <span class="led led-waiting" id="statusLed"></span>
        <span id="statusText">Connecting to MQTT...</span>
        <span id="lastMessageTime" style="float: right; font-family: monospace;"></span>
    </div>
</div>

<script>
    // ============================================
    // 🔧 ADMIN GUI CONFIGURATION - SEES ALL SITES
    // ============================================
    
    // MQTT Configuration (SAME as ESP32)
    const MQTT_HOST = "wss://699cfaaf78a040b5a6ab0bb14948e8f1.s1.eu.hivemq.cloud:8884/mqtt";
    const MQTT_USERNAME = "Admin";
    const MQTT_PASSWORD = "Admin12345";
    
    // ============================================
    // TOPICS - Admin subscribes to ALL sites
    // ============================================
    // ← DO NOT CHANGE - These topics receive ALL site data
    const ADMIN_TOPICS = [
        "drm/admin/all",           // All site status messages
        "drm/alerts/critical",     // Critical alerts (RED/ORANGE)
        "river/+/status",          // Wildcard for all individual sites
        "river/+/telemetry"        // Wildcard for all telemetry
    ];
    
    // Store site data
    let sites = {};
    let allLogs = [];
    let lastMessageTime = Date.now();
    
    // ============================================
    // Helper Functions
    // ============================================
    function updateStats() {
        const counts = { RED: 0, ORANGE: 0, YELLOW: 0, total: 0 };
        
        for (const id in sites) {
            if (sites[id].alert === 'RED') counts.RED++;
            else if (sites[id].alert === 'ORANGE') counts.ORANGE++;
            else if (sites[id].alert === 'YELLOW') counts.YELLOW++;
            counts.total++;
        }
        
        document.getElementById('totalSites').innerHTML = counts.total;
        document.getElementById('redCount').innerHTML = counts.RED;
        document.getElementById('orangeCount').innerHTML = counts.ORANGE;
        document.getElementById('yellowCount').innerHTML = counts.YELLOW;
    }
    
    function addLog(level, river, location, message, instruction) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-PH', { hour12: false });
        const dateStr = now.toLocaleDateString('en-PH');
        
        allLogs.unshift({
            time: timeStr,
            date: dateStr,
            level: level,
            river: river,
            location: location,
            message: message,
            instruction: instruction
        });
        
        if (allLogs.length > 200) allLogs.pop();
        renderLogs();
    }
    
    function renderLogs() {
        const logsDiv = document.getElementById('logsList');
        if (allLogs.length === 0) {
            logsDiv.innerHTML = '<div style="text-align: center; padding: 20px;">No incidents logged</div>';
            return;
        }
        
        logsDiv.innerHTML = allLogs.map(log => `
            <div class="log-entry log-${log.level.toLowerCase()}">
                <strong>[${log.level}]</strong> ${log.river} (${log.location}) - ${log.message}
                <div style="font-size: 0.7em; color: #8892b0; margin-top: 3px;">${log.date} ${log.time}</div>
            </div>
        `).join('');
    }
    
    function exportLogs() {
        if (allLogs.length === 0) {
            alert("No logs to export");
            return;
        }
        
        let csv = "\uFEFFDate,Time,Level,River,Location,Message,Instruction\n";
        allLogs.forEach(log => {
            csv += `${log.date},${log.time},${log.level},${log.river},${log.location},"${log.message}","${log.instruction}"\n`;
        });
        
        const now = new Date();
        const filename = `drm_admin_logs_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_${now.getHours()}${now.getMinutes()}.csv`;
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
    }
    
    function updateSiteUI(siteId, data) {
        const card = document.getElementById(`card-${siteId}`);
        if (!card) return;
        
        // Update alert level class
        card.className = 'site-card';
        if (data.alert === 'RED') card.classList.add('level-red');
        else if (data.alert === 'ORANGE') card.classList.add('level-orange');
        else if (data.alert === 'YELLOW') card.classList.add('level-yellow');
        else if (data.offline) card.classList.add('offline');
        else card.classList.add('level-normal');
        
        // Update content
        const alertDisplay = card.querySelector('.alert-display');
        const alertMessage = card.querySelector('.alert-message');
        const alertInstruction = card.querySelector('.alert-instruction');
        const lastUpdate = card.querySelector('.last-update');
        const rssiSpan = card.querySelector('.rssi');
        const statusSpan = card.querySelector('.site-status');
        
        if (alertDisplay) {
            if (data.offline) {
                alertDisplay.innerHTML = '📡 OFFLINE';
                alertDisplay.style.color = '#757575';
                alertMessage.innerHTML = 'No telemetry received';
                alertInstruction.innerHTML = 'Check device connection';
                statusSpan.className = 'site-status status-offline';
                statusSpan.innerHTML = 'OFFLINE';
            } else {
                alertDisplay.innerHTML = data.alert === 'RED' ? '🔴 RED ALERT' :
                                        data.alert === 'ORANGE' ? '🟠 ORANGE ALERT' :
                                        data.alert === 'YELLOW' ? '🟡 YELLOW ALERT' : '✅ NORMAL';
                alertDisplay.style.color = '';
                alertMessage.innerHTML = data.message || 'River conditions normal';
                alertInstruction.innerHTML = data.instruction || 'No action required';
                statusSpan.className = `site-status ${data.rssi && data.rssi < -70 ? 'status-warning' : 'status-online'}`;
                statusSpan.innerHTML = data.rssi && data.rssi < -70 ? 'WEAK SIGNAL' : 'ONLINE';
            }
        }
        
        if (rssiSpan && data.rssi) rssiSpan.innerHTML = data.rssi;
        if (lastUpdate && data.lastUpdate) lastUpdate.innerHTML = data.lastUpdate;
    }
    
    function renderDashboard() {
        const grid = document.getElementById('dashboardGrid');
        if (Object.keys(sites).length === 0) {
            grid.innerHTML = '<div style="text-align: center; padding: 50px;">No sites detected yet. Waiting for data...</div>';
            return;
        }
        
        grid.innerHTML = Object.keys(sites).map(siteId => {
            const s = sites[siteId];
            return `
                <div class="site-card level-normal" id="card-${siteId}">
                    <div class="site-header">
                        <div class="site-title">
                            <h3>${s.river || siteId}</h3>
                            <p>${s.location || 'Location unknown'}</p>
                        </div>
                        <div class="site-status status-online">ONLINE</div>
                    </div>
                    <div class="alert-display">✅ NORMAL</div>
                    <div class="alert-message">River conditions normal</div>
                    <div class="alert-instruction">No action required</div>
                    <div class="site-footer">
                        <span>📡 RSSI: <span class="rssi">--</span> dBm</span>
                        <span class="last-update">🕐 --:--:--</span>
                    </div>
                </div>
            `;
        }).join('');
        
        // Update each card with actual data
        for (const siteId in sites) {
            updateSiteUI(siteId, sites[siteId]);
        }
    }
    
    function processStatus(data) {
        const siteId = data.site_id;
        if (!siteId) return;
        
        if (!sites[siteId]) {
            sites[siteId] = {
                river: data.river || siteId,
                location: data.location || 'Unknown',
                alert: 'NORMAL',
                message: '',
                instruction: '',
                rssi: null,
                lastUpdate: null,
                offline: false
            };
        }
        
        const now = new Date();
        sites[siteId].alert = data.alert || 'NORMAL';
        sites[siteId].message = data.message || '';
        sites[siteId].instruction = data.instruction || '';
        sites[siteId].lastUpdate = now.toLocaleTimeString('en-PH', { hour12: false });
        sites[siteId].offline = false;
        
        if (data.event !== 'continuous') {
            addLog(data.alert || 'NORMAL', sites[siteId].river, sites[siteId].location, 
                   data.message || 'Status update', data.instruction || '');
        }
        
        updateSiteUI(siteId, sites[siteId]);
        updateStats();
    }
    
    function processTelemetry(data) {
        const siteId = data.site_id;
        if (!siteId || !sites[siteId]) return;
        
        sites[siteId].rssi = data.rssi;
        const now = new Date();
        sites[siteId].lastUpdate = now.toLocaleTimeString('en-PH', { hour12: false });
        sites[siteId].offline = false;
        
        updateSiteUI(siteId, sites[siteId]);
    }
    
    // Offline detection
    setInterval(() => {
        const now = Date.now();
        for (const siteId in sites) {
            if (sites[siteId].lastUpdate) {
                const lastTime = new Date('1970/01/01 ' + sites[siteId].lastUpdate).getTime();
                if (now - lastTime > 35000) {
                    if (!sites[siteId].offline) {
                        sites[siteId].offline = true;
                        sites[siteId].alert = 'OFFLINE';
                        updateSiteUI(siteId, sites[siteId]);
                        addLog('OFFLINE', sites[siteId].river, sites[siteId].location, 
                               'No communication received', 'Check device connection');
                        updateStats();
                    }
                }
            }
        }
    }, 5000);
    
    // ============================================
    // MQTT Connection
    // ============================================
    let client = null;
    
    function connectMQTT() {
        const led = document.getElementById('statusLed');
        const textSpan = document.getElementById('statusText');
        led.className = 'led led-waiting';
        textSpan.innerHTML = 'Connecting to MQTT...';
        
        client = mqtt.connect(MQTT_HOST, {
            username: MQTT_USERNAME,
            password: MQTT_PASSWORD,
            protocol: 'wss',
            reconnectPeriod: 5000,
            connectTimeout: 15000,
            keepalive: 60
        });
        
        client.on('connect', () => {
            console.log('✅ Admin MQTT Connected');
            led.className = 'led led-online';
            textSpan.innerHTML = '✅ Connected · Monitoring all sites';
            
            ADMIN_TOPICS.forEach(topic => {
                client.subscribe(topic, (err) => {
                    if (err) console.error('Subscribe error:', topic, err);
                    else console.log('Subscribed to:', topic);
                });
            });
        });
        
        client.on('error', (err) => {
            console.error('MQTT Error:', err);
            led.className = 'led led-offline';
            textSpan.innerHTML = '❌ Connection error';
        });
        
        client.on('message', (topic, payload) => {
            try {
                const data = JSON.parse(payload.toString());
                lastMessageTime = Date.now();
                document.getElementById('lastMessageTime').innerHTML = `📡 Last: ${new Date().toLocaleTimeString()}`;
                
                if (topic.includes('/status')) {
                    processStatus(data);
                } else if (topic.includes('/telemetry')) {
                    processTelemetry(data);
                }
            } catch(e) {
                console.error('Parse error:', e);
            }
        });
    }
    
    // Update connection status indicator
    setInterval(() => {
        const timeSince = (Date.now() - lastMessageTime) / 1000;
        const led = document.getElementById('statusLed');
        const textSpan = document.getElementById('statusText');
        
        if (timeSince > 35) {
            led.className = 'led led-offline';
            textSpan.innerHTML = '⚠️ No data received for ' + Math.floor(timeSince) + 's';
        } else if (timeSince > 15) {
            led.className = 'led led-waiting';
            textSpan.innerHTML = '⏳ Waiting for data... ' + Math.floor(timeSince) + 's';
        }
    }, 2000);
    
    // Initialize
    connectMQTT();
</script>
</body>
</html>
